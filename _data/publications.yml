  title: "Lergan: A zero-free, low data movement and pim-based gan architecture"
  authors: "<a href='https://hybol1993.github.io/'><u>Haiyu Mao</u></a>, Mingcong Song, Tao Li, Yuting Dai, and Jiwu Shu"
  venue: MICRO 2018
  type: conference
  pdf: "https://hybol1993.github.io/assets/pdf/LrGAN.pdf"
  doi: 10.1109/micro.2018.00060
  bibtex: "@inproceedings{Mao_2018, title={LerGAN: A Zero-Free, Low Data Movement and PIM-Based GAN Architecture}, url={http://dx.doi.org/10.1109/micro.2018.00060}, DOI={10.1109/micro.2018.00060}, booktitle={2018 51st Annual IEEE/ACM International Symposium on Microarchitecture (MICRO)}, publisher={IEEE}, author={Mao, Haiyu and Song, Mingcong and Li, Tao and Dai, Yuting and Shu, Jiwu}, year={2018}, month=oct, pages={669–681} }"
  abstract: "As a powerful unsupervised learning method, Generative Adversarial Network (GAN) plays an important role in many domains such as video prediction and autonomous driving. It is one of the ten breakthrough technologies in 2018 reported in MIT Technology Review. However, training a GAN imposes three more challenges: (1) intensive communication caused by complex train phases of GAN, (2) much more ineffectual computations caused by special convolutions, and (3) more frequent off-chip memory accesses for exchanging inter-mediate data between the generator and the discriminator. In this paper, we propose LerGAN, a PIM-based GAN accelerator to address the challenges of training GAN. We first propose a zero-free data reshaping scheme for ReRAM-based PIM, which removes the zero-related computations. We then propose a 3D-connected PIM, which can reconfigure connections inside PIM dynamically according to dataflows of propagation and updating. Our proposed techniques reduce data movement to a great extent, avoiding I/O to become a bottleneck of training GANs. Finally, we propose LerGAN based on these two techniques, providing different levels of accelerating GAN for programmers. Experiments shows that LerGAN achieves 47.2X, 21.42X and 7.46X speedup over FPGA-based GAN accelerator, GPU platform, and ReRAM-based neural network accelerator respectively. Moreover, LerGAN achieves 9.75X, 7.68X energy saving on average over GPU platform, ReRAM-based neural network accelerator respectively, and has 1.04X energy consuming over FPGA-based GAN accelerator."
