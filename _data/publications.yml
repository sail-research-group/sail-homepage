  title: "REIS: A High-Performance and Energy-Efficient Retrieval System with In-Storage Processing"
  authors: "Kangqi Chen, Rakesh Nadig, Andreas Kosmas Kakolyris, Manos Frouzakis, Nika Mansouri Ghiasi, Yu Liang, <a href='https://hybol1993.github.io/'><u>Haiyu Mao</u></a>, Jisung Park, Mohammad Sadrosadati, and Onur Mutlu"
  venue: ISCA 2025
  type: conference
  pdf: "https://hybol1993.github.io/assets/pdf/reis.pdf"
  doi: 10.1145/3695053.3731116
  bibtex: "@inproceedings{Chen_2025, series={SIGARCH ’25}, title={REIS: A High-Performance and Energy-Efficient Retrieval System with In-Storage Processing}, url={http://dx.doi.org/10.1145/3695053.3731116}, DOI={10.1145/3695053.3731116}, booktitle={Proceedings of the 52nd Annual International Symposium on Computer Architecture}, publisher={ACM}, author={Chen, Kangqi and Nadig, Rakesh and Frouzakis, Manos and Ghiasi, Nika Mansouri and Liang, Yu and Mao, Haiyu and Park, Jisung and Sadrosadati, Mohammad and Mutlu, Onur}, year={2025}, month=june, pages={1171–1192}, collection={SIGARCH ’25} }"
  abstract: "Large Language Models (LLMs) face an inherent challenge: their knowledge is confined to the data that they have been trained on. This limitation, combined with the significant cost of retraining renders them incapable of providing up-to-date responses. To overcome these issues, Retrieval-Augmented Generation (RAG) complements the static training-derived knowledge of LLMs with an external knowledge repository. RAG consists of three stages: (i) indexing, which creates a database that facilitates similarity search on text embeddings, (ii) retrieval, which, given a user query, searches and retrieves relevant data from the database and (iii) generation, which uses the user query and the retrieved data to generate a response. The retrieval stage of RAG in particular becomes a significant performance bottleneck in inference pipelines. In this stage, (i) a given user query is mapped to an embedding vector and (ii) an Approximate Nearest Neighbor Search (ANNS) algorithm searches for the most semantically similar embedding vectors in the database to identify relevant items. Due to the large database sizes, ANNS incurs significant data movement overheads between the host and the storage system. To alleviate these overheads, prior works propose In-Storage Processing (ISP) techniques that accelerate ANNS workloads by performing computations inside the storage system. However, existing works that leverage ISP for ANNS (i) employ algorithms that are not tailored to ISP systems, (ii) do not accelerate data retrieval operations for data selected by ANNS, and (iii) introduce significant hardware modifications to the storage system, limiting performance and hindering their adoption. We propose REIS, the first Retrieval system tailored for RAG with In-Storage processing that addresses the limitations of existing implementations with three key mechanisms. First, REIS employs a database layout that links database embedding vectors to their associated documents, enabling efficient retrieval. Second, it enables efficient ANNS by introducing an ISP-tailored algorithm and data placement technique that: (i) distributes embeddings across all planes of the storage system to exploit parallelism, and (ii) employs a lightweight Flash Translation Layer (FTL) to improve performance. Third, REIS leverages an ANNS engine that uses the existing computational resources inside the storage system, without requiring hardware modifications. The three key mechanisms form a cohesive framework that largely enhances both the performance and energy efficiency of RAG pipelines. Compared to a high-end server-grade system, REIS improves the performance (energy efficiency) of the retrieval stage by an average of 13 × (55 ×). REIS offers improved performance against existing ISP-based ANNS accelerators, without introducing any hardware modifications, enabling easier adoption for RAG pipelines."
  keywords:
  - In-Storage Computing (ISC)
  - LLM
  - Retrieval-Augmented Generation
